version: "3.9"

services:
  ide:
    container_name: ide
    build:
      context: .
      dockerfile: Dockerfile.ide
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ide-work:/home/coder/project
    networks:
      - ide-net

  spawner:
    image: python:3.12-slim
    container_name: spawner
    entrypoint: >
      bash -c "
      mkdir -p /app &&
      cat << 'EOF' > /app/spawner.py
from flask import Flask, request, jsonify
import docker, uuid

app = Flask(__name__)
client = docker.from_env()

IMAGE_MAP = {
    'dotnet8': 'mcr.microsoft.com/dotnet/sdk:8.0',
    'dotnet7': 'mcr.microsoft.com/dotnet/sdk:7.0',
    'dotnet6': 'mcr.microsoft.com/dotnet/sdk:6.0',
    'mono': 'mono:latest',
    'python': 'python:3.12-slim'
}

@app.post('/run')
def run_program():
    data = request.json or {}
    runtime = data.get('runtime', 'dotnet8')
    workspace = data.get('workspace', '/workspace')

    if runtime not in IMAGE_MAP:
        return jsonify({'error': 'unknown runtime'}), 400

    run_cmd = data.get('command')
    if not run_cmd:
        if runtime.startswith('dotnet'):
            run_cmd = 'dotnet run'
        elif runtime == 'mono':
            run_cmd = 'bash -c \"msbuild && mono bin/Debug/*/*.exe\"'
        else:
            run_cmd = 'python3 main.py'

    container = client.containers.run(
        IMAGE_MAP[runtime],
        command=f\"bash -c 'cd /app && {run_cmd}'\",
        volumes={workspace: {'bind': '/app', 'mode': 'rw'}},
        detach=True,
        network='none',
        name=f\"run-{runtime}-{uuid.uuid4()}\"
    )
    return jsonify({'id': container.id})

@app.post('/kill')
def kill():
    cid = (request.json or {}).get('id')
    try:
        client.containers.get(cid).remove(force=True)
        return jsonify({'status': 'killed'})
    except:
        return jsonify({'error': 'not found'}), 404

@app.get('/logs/<cid>')
def logs(cid):
    try:
        c = client.containers.get(cid)
        return c.logs().decode('utf-8')
    except:
        return 'not found', 404

app.run(host='0.0.0.0', port=8090)
EOF
      pip install flask docker &&
      python3 /app/spawner.py
      "
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ide-work:/workspace:ro
    ports:
      - "127.0.0.1:8090:8090"
    networks:
      - ide-net

# ---------------------------------------------------------
# Inline Dockerfile generated at runtime
# ---------------------------------------------------------
# This is created dynamically by Compose using build.dockerfile
# ---------------------------------------------------------
x-generated-dockerfile: &dockerfile |
  FROM codercom/code-server:latest

  USER root

  RUN apt-get update && \
      apt-get install -y curl wget python3 python3-pip mono-complete && \
      rm -rf /var/lib/apt/lists/*

  RUN curl -sSL https://dot.net/v1/dotnet-install.sh -o /tmp/dotnet-install.sh && \
      bash /tmp/dotnet-install.sh --channel 6.0 && \
      bash /tmp/dotnet-install.sh --channel 7.0 && \
      bash /tmp/dotnet-install.sh --channel 8.0

  RUN code-server --install-extension ms-dotnettools.csharp && \
      code-server --install-extension ms-python.python && \
      code-server --install-extension ms-python.debugpy && \
      code-server --install-extension ms-vscode.mono-debug

  RUN mkdir -p /vsdbg && \
      wget https://aka.ms/getvsdbgsh -O /tmp/getvsdbg.sh && \
      bash /tmp/getvsdbg.sh -v latest -l /vsdbg

  USER coder
  WORKDIR /home/coder/project

  CMD ["bash", "-c", "code-server --bind-addr 0.0.0.0:8080 --auth none"]

# Attach inline Dockerfile
services:
  ide:
    build:
      dockerfile: Dockerfile.ide

# Compose writes the Dockerfile into the build context at runtime
configs:
  Dockerfile.ide:
    content: *dockerfile

networks:
  ide-net:
    driver: bridge

volumes:
  ide-work: